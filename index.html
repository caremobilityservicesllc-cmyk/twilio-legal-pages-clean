<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Care Mobility Services LLC - Legal</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #16202a;
      --muted: #5b6977;
      --accent: #0c7a5a;
      --border: #d7e0e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef7f4 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(22, 32, 42, 0.08);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.6; color: var(--muted); }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    a.link {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: #f9fbfc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    a.link strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Care Mobility Services LLC</h1>
      <p>This site hosts the public legal pages used for SMS compliance and customer reference.</p>
      <div class="links">
        <a class="link" href="./privacy-policy.html">
          <strong>Privacy Policy</strong>
          Review how information is collected, used, and protected.
        </a>
        <a class="link" href="./terms-and-conditions.html">
          <strong>Terms and Conditions</strong>
          Review SMS program terms, message frequency, and opt-out instructions.
        </a>
      </div>
    </section>
  </main>
</body>
</html>
